name: Currency audit

on:
  schedule:
    # First day of every quarter at 14:00 UTC.
    - cron: '0 14 1 1,4,7,10 *'
  workflow_dispatch: # allow manual run from the Actions tab

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run currency audit
        id: audit
        run: |
          node scripts/audit-currency.mjs > audit-report.md
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat audit-report.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Open or update tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('audit-report.md', 'utf8')
            const title = `Quarterly content audit — ${new Date().toISOString().slice(0, 10)}`

            // Look for an existing open issue from this workflow
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'currency-audit',
            })

            if (open.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                title,
                body,
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['currency-audit'],
              })
            }
